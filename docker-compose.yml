version: '3.8'

services:
  # Datenbank-Dienst 
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SuperSecretPassw0rd!
    ports:
      - "1433:1433"

  # ASP.NET Core MVC-Dienst
  web:
    build:
      context: ./Mini-Warehous-Manager-System
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver
    environment:
      # die lokale LocalDB mit der SQL Server-Instanz aus dem Container
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=MiniWmsMvcDb;User Id=sa;Password=SuperSecretPassw0rd!;TrustServerCertificate=True;